<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-Classes</title>
    <style>
        button:hover {
            background-color: red;
            color: white;
        }

        button:active {
            background-color: aqua;
        }

        input:focus {
            border: 2px solid red;
        }
        p::after{
            content: "*";
        }
    </style>
</head>

<body>
    <button>Click me</button>
    <input type="Kazol">
    <p>This is about the pseudo elements about the pseudo classes.</p>
</body>

</html>
