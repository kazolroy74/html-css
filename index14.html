<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Selectors</title>
    <style>
        /* universal selectors  */
        * {
            color: red;
            background-color: wheat:
        }

        /* element selectors  */
        h2 {
            font-size: 16px;
        }

        p {
            font-size: 10px;
        }

        /* class selectors  */
        .button {
            background-color: blue;
            color: aqua;
        }

        /* id selectors */
        #header {
            background-color: gray;
        }
    </style>
</head>

<body>
    <header>
        <h2>This is the universal selectors. </h2>
        <p>Universal selectors apply for all elements.</p>
        <h2>This is hero section start here.</h2>
        <p>Hero section is the main section of the web.</p>
    </header>
    <div id="header">This is the header section.</div>
    <button class="button">Click Me</button>
</body>

</html>
