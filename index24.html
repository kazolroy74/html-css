<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caption</title>
    <style>
        table,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 5px;
        }
    </style>
</head>

<body>
    <table>
        <caption>Details</caption>
        <tr>
            <th>Firstname</th>
            <th>Lastname</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Lucass</td>
            <td>Rossi</td>
            <td>25</td>
        </tr>
        <tr>
            <td>Sophie</td>
            <td>Dubois</td>
            <td>30</td>
        </tr>
        <tr>
            <td>Sam</td>
            <td>Watson</td>
            <td>50</td>
        </tr>
    </table>
</body>

</html>
