<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cell span for rows</title>
    <style>
        table,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 5px;
            text-align: left;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <th rowspan="2">Name</th>
            <td>---</td>
        </tr>
        <tr>
            <td>xyx</td>
        </tr>
        <tr>
            <th>Telephone</th>
            <td>123</td>
        </tr>
    </table>
</body>

</html>
