<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Queries</title>
    <style>
        .w3 {
            color: black;
        }

        /* media query syntax: 
        @media mediatype and (condition) {CSS Style} */
        @media screen and (max-width: 500px) {
            w3 {
                color: green;
            }
        }
    </style>
</head>

<body>
    <div class="w3">Sample of Media Query</div>
</body>

</html>
