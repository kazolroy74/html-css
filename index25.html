<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested <Table></Table>
    </title>
    <style>
        table {
            border: 1px solid black;
            border-color: grey;
            border-collapse: collapse;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <td>fist column of outer table</td>
            <td>
                <table>
                    <tr>
                        <td>First row of Inner Table</td>
                    </tr>
                    <tr>
                        <td>Second row of Inner Table.</td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
