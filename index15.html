<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combinator Selectors</title>
    <!-- descendent selector  -->
    <style>
        /* div p {
            color: red;
        } */
        /* child selectors  */
        /* div>p{
            margin-left: 20px;
        } */
        /* adjacent sibling selector */
        /* h1+h2+p {
            font-weight: bold;
        } */
         /* general sibling selector */
         h1~h2{
            font-style: italic;
         }
    </style>
</head>

<body>
    <div>
        <!-- <h1></h1> -->
        <h1>This is the direct child and has a left margin.</h1>
        <h2>This is the title of header2.</h2>
        <p>This paragraph inside a div will be red.</p>
        <div>
            <p>this is not a direct child.</p>
        </div>
    </div>
</body>

</html>
