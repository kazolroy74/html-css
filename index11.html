<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Design</title>
    <style>
        body {
            font-size: 16px;
        }

        @media(max-width: 600px) {
            body {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <p>Resize the browser to see the font size change.</p>
</body>

</html>
