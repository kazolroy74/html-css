<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML TABLES</title>
    <!-- Styling Of HTML Tables -->
    <!-- Adding Border Collapse property -->
    <!-- Adding cell padding  -->
    <style>
        table {
            width: 100%;
        }

        table,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px;
        }

        th {
            text-align: left;
        }

        /* Adding border spacing proper--initial|length|inherit */
        table {
            border-spacing: 5px;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <th>Firstname</th>
            <th>Lastname</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Sophie</td>
            <td>Dubois</td>
            <td>32</td>
        </tr>
        <tr>
            <td>Sam</td>
            <td>Watson</td>
            <td>41</td>
        </tr>
        <tr>
            <td>Luca</td>
            <td>Rossi</td>
            <td>24</td>
        </tr>
        <tr>
            <td>Manual</td>
            <td>Watson</td>
            <td>35</td>
        </tr>
    </table>
</body>

</html>
