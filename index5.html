<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font and Text</title>
    <style>
        h1 {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
        }

        p {
            font-size: 32px;
            font-weight: block;
            text-align: center;
            text-transform: lowercase;
        }
    </style>
</head>

<body>
    <h1>
        this is the font and text block
    </h1>
    <p>
        This is the paragraph about the font and text matter.
        That's includes all the result about text and font matters.
    </p>
</body>

</html>
